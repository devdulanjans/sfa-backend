spring:
  application:
    name: sfa-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sfadb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-long-secret-in-production-min-64-chars-required}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:86400000}       # 24 hours (dev default; override via env var in prod)
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}   # 7 days

  company:
    name: ${COMPANY_NAME:Iceman Cold Chain Services (Pvt) Ltd}
    tin: ${COMPANY_TIN:114372315-7000}
    reg-address: ${COMPANY_REG_ADDRESS:"No.43, St. Theresa's Road, Ragalla, Kandana"}
    operating-address: ${COMPANY_OP_ADDRESS:"No.60/2, Aniyakanda Estate, Aniyakanda, Nagoda, Kandana"}
    phone: ${COMPANY_PHONE:0112059224}
    email: ${COMPANY_EMAIL:sales@iceman.lk}
    bank:
      account-name: ${BANK_ACCOUNT_NAME:Iceman Cold Chain Services (Pvt) Ltd}
      account-number: ${BANK_ACCOUNT_NUMBER:1000973103}
      name: ${BANK_NAME:Commercial Bank of Ceylon PLC}
      branch: ${BANK_BRANCH:Kandana Branch}

  invoice:
    vat-rate: ${INVOICE_VAT_RATE:18}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:sfa-invoices}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

  platform-owner:
    bootstrap-password: ${PLATFORM_OWNER_PASSWORD:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false

logging:
  level:
    com.sfa: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
